<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #111827;
      --panel: rgba(17, 24, 39, 0.82);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --brand: #22c55e;
      --brand-2: #16a34a;
      --user: #2563eb;
      --bot: #1f2937;
      --danger: #ef4444;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.18), transparent 26%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow: hidden;
    }

    .hero {
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    .hero-card {
      max-width: 760px;
      padding: 36px 28px;
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      background: rgba(15, 23, 42, 0.5);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.12);
      color: #86efac;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(2rem, 4vw, 4rem);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 1rem;
    }

    .cta {
      margin-top: 18px;
      color: #d1fae5;
      font-weight: 600;
    }

    .chat-fab {
      position: fixed;
      right: 22px;
      bottom: 22px;
      width: 62px;
      height: 62px;
      border: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: white;
      font-size: 1.35rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 18px 40px rgba(34, 197, 94, 0.35);
      z-index: 1000;
    }

    .chat-fab:hover { transform: translateY(-2px); }

    .chat-popup {
      position: fixed;
      right: 22px;
      bottom: 96px;
      width: min(380px, calc(100vw - 24px));
      height: min(620px, calc(100vh - 130px));
      border-radius: 24px;
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: var(--shadow);
      display: none;
      overflow: hidden;
      z-index: 1000;
    }

    .chat-popup.open { display: flex; flex-direction: column; animation: pop-in 0.18s ease-out; }

    @keyframes pop-in {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 14px;
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.18), rgba(37, 99, 235, 0.14));
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .chat-title { font-weight: 800; font-size: 1rem; }
    .chat-subtitle { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }

    .chat-close {
      border: 0;
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      cursor: pointer;
      font-size: 1rem;
    }

    .chat-body {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 95%;
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 0.95rem;
      white-space: normal;
      word-break: normal;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .msg.user {
      margin-left: auto;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.95), rgba(59, 130, 246, 0.88));
      color: white;
      border-bottom-right-radius: 6px;
    }

    .msg.bot {
      margin-right: auto;
      background: var(--bot);
      color: #e5e7eb;
      border-bottom-left-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .msg.system {
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 0.85rem;
      border-radius: 999px;
    }

    .typing {
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #cbd5e1;
      animation: pulse 1s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.12s; }
    .typing span:nth-child(3) { animation-delay: 0.24s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-3px); opacity: 1; }
    }

    .chat-footer {
      padding: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(15, 23, 42, 0.85);
    }

    .chat-form {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-input {
      flex: 1;
      min-height: 48px;
      max-height: 120px;
      resize: none;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      padding: 13px 14px;
      outline: none;
      font: inherit;
    }

    .chat-input::placeholder { color: #94a3b8; }

    .send-btn {
      border: 0;
      border-radius: 16px;
      min-width: 84px;
      height: 48px;
      padding: 0 16px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-bar {
      margin-top: 10px;
      color: #fecaca;
      font-size: 0.88rem;
      min-height: 20px;
    }

    @media (max-width: 480px) {
      .chat-popup {
        right: 12px;
        left: 12px;
        width: auto;
        bottom: 90px;
        height: min(72vh, 620px);
      }

      .chat-fab {
        right: 12px;
        bottom: 12px;
      }

      .hero-card {
        padding: 26px 20px;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="hero-card">
      <span class="eyebrow">AI Chat Test</span>
      <h1>Floating Chatbot Demo</h1>
      <p>
        Ini halaman simpel buat ngetes AI chatbot kamu. Klik tombol hijau di kanan bawah,
        lalu coba kirim pertanyaan ke backend FastAPI kamu.
      </p>
      <p class="cta">Endpoint yang dipakai: /api/chat</p>
    </div>
  </main>

  <button class="chat-fab" id="chatFab" aria-label="Buka chatbot">💬</button>

  <section class="chat-popup" id="chatPopup" aria-label="Popup chatbot">
    <header class="chat-header">
      <div>
        <div class="chat-title">Niscahya AI Bot</div>
        <div class="chat-subtitle">Tes cepat AI + RAG</div>
      </div>
      <button class="chat-close" id="chatClose" aria-label="Tutup chatbot">✕</button>
    </header>

    <div class="chat-body" id="chatBody">
      <div class="msg system">Halo, tulis pertanyaan kamu di bawah.</div>
    </div>

    <footer class="chat-footer">
      <form class="chat-form" id="chatForm">
        <textarea class="chat-input" id="chatInput" placeholder="Ketik pesan..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" type="submit">Kirim</button>
      </form>
      <div class="error-bar" id="errorBar"></div>
    </footer>
  </section>

  <script>
    const API_BASE_URL = "";
    const SESSION_KEY = "niscahya-chat-session";
    const sessionId = localStorage.getItem(SESSION_KEY) || `chat-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
    localStorage.setItem(SESSION_KEY, sessionId);

    const chatFab = document.getElementById("chatFab");
    const chatPopup = document.getElementById("chatPopup");
    const chatClose = document.getElementById("chatClose");
    const chatBody = document.getElementById("chatBody");
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");
    const sendBtn = document.getElementById("sendBtn");
    const errorBar = document.getElementById("errorBar");

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function scrollToBottom() {
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function setError(message = "") {
      errorBar.textContent = message;
    }

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      // Preserve paragraph breaks (\n\n) but clean up excessive ones
      const cleaned = escapeHtml(text)
        .replace(/\n\n+/g, "\n")  // Collapse multiple newlines to single
        .split("\n")
        .map(line => line.trim())
        .filter(line => line.length > 0)
        .join("<br>");
      div.innerHTML = cleaned;
      chatBody.appendChild(div);
      scrollToBottom();
      return div;
    }

    function addTyping() {
      const div = document.createElement("div");
      div.className = "msg bot";
      div.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
      chatBody.appendChild(div);
      scrollToBottom();
      return div;
    }

    function openChat() {
      chatPopup.classList.add("open");
      chatInput.focus();
      scrollToBottom();
    }

    function closeChat() {
      chatPopup.classList.remove("open");
      setError("");
    }

    chatFab.addEventListener("click", () => {
      if (chatPopup.classList.contains("open")) {
        closeChat();
      } else {
        openChat();
      }
    });

    chatClose.addEventListener("click", closeChat);

    chatInput.addEventListener("input", () => {
      chatInput.style.height = "auto";
      chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + "px";
    });

    chatInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        chatForm.requestSubmit();
      }
    });

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setError("");

      const message = chatInput.value.trim();
      if (!message) return;

      addMessage(message, "user");
      chatInput.value = "";
      chatInput.style.height = "auto";

      const typingNode = addTyping();
      sendBtn.disabled = true;
      chatInput.disabled = true;

      try {
        const response = await fetch(`${API_BASE_URL}/api/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, session_id: sessionId })
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.detail || "Gagal mendapatkan jawaban dari AI.");
        }

        typingNode.remove();
        addMessage(payload.answer || "AI tidak mengembalikan jawaban.", "bot");
      } catch (error) {
        typingNode.remove();
        setError(error.message || "Terjadi kesalahan saat menghubungi server.");
        addMessage("Maaf, ada kendala saat memproses pesan kamu.", "bot");
      } finally {
        sendBtn.disabled = false;
        chatInput.disabled = false;
        chatInput.focus();
      }
    });

    openChat();
  </script>
</body>
</html>
